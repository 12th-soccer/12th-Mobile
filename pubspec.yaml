name: twelfth_mobile
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+3

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10
  go_router: ^14.0.0
  flutter_riverpod: ^2.6.1
  dio: ^5.9.2
  flutter_secure_storage: ^10.0.0
  url_launcher: ^6.3.1
  app_links: ^6.0.0
  firebase_core: ^3.13.0
  firebase_auth: ^5.3.3
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard.ttf
          weight: 400
        - asset: assets/fonts/Pretendard.ttf
          weight: 600

  assets:
    - assets/images/
